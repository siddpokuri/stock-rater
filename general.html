<!DOCTYPE html>
<html>
<head>
  <title>General Info</title>
  <style>
    body {
      font-family: helvetica;
      align-items: center;
      justify-content: center;
      background-color: #5c705c;
      color: #293629;
      justify-content: center;
      margin: 20px;
      padding: 10px;
    }
    h2 {
      color: #293629;
      text-align: center;
      font-size: 100px;
      padding: 10px;
    }
    #backbutton {
      background-color: #2e3b2e;
      color: white;
      font-family: helvetica;
      border: none;
      text-align: center;
      border-radius: 5px;
      font-size: 30px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <h2>General Info</h2>
  <div class="info" id="infobox">Loading...</div>
  <br><br>
  <button id="backbutton" onclick="goback()">Back</button>

  <script>
    const params = new URLSearchParams(window.location.search);
    const stock = params.get("stock");

    fetch(`https://stock-backend-0128.onrender.com/generalinfo?stock=${stock}`)
      .then(res => {
        if (!res.ok) {
          throw new Error("Server responded with status " + res.status);
        }
        return res.json();
      })
      .then(data => {
        const infobox = document.getElementById("infobox");
        infobox.innerHTML = '';

        for (const key in data) {
          const value = data[key];
          const item = document.createElement('div');
          item.className = 'info-item';
          item.innerHTML = `<strong>${key}:</strong>: <span>${value}</span>`;
          infobox.appendChild(item);
        }
      })
      .catch(err => {
        document.getElementById("infobox").innerText = "Error: " + err.message;
      });
    function goback(){
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
