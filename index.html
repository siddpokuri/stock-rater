<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Rater</title>
  <style>
    body {
      font-family: helvetica;
      align-items: center;
      justify-content: center;
      background-color: #5c705c;
      color: #293629;
      justify-content: center;
      margin: 20px;
      padding: 10px;
    }
    h1 {
      color: #293629;
      text-align: center;
      font-size: 100px;
      padding: 10px;
    }
    .centered-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    #ratebutton,
    #genbutton,
    #comparebutton,
    #insiderbutton {
      background-color: #2e3b2e;
      color: white;
      font-family: helvetica;
      border: none;
      text-align: center;
      border-radius: 5px;
      font-size: 30px;
      padding: 20px;
    }
    #stockInput {
      background-color: 2e3b2e;
      font-size: 30px;
      color: 4c634d;
      text-align: center;
      padding: 20px;
      border-radius: 6px;
    }
    #stockInput::placeholder {
      color: #a0a0a0;
    }
  </style>
</head>
<body>
  <h1>Stock Rater</h1>
  <div class="controls">
    <input type="text" id="stockInput" placeholder="Enter a stock symbol" />
    <div class="button-group">
      <button id="genbutton" onclick="goTo('general')">Get General Info</button>
      <button id="ratebutton" onclick="goTo('rate')">Get Rating</button>
      <button id="comparebutton" onclick="gocompare()">Compare Two Stocks</button>
      <button id="insiderbutton" onclick="goinsider()">Get Latest Insider Trades</button>
    </div>
  </div>

  <script>
    function goTo(type) {
      const stock = document.getElementById("stockInput").value.trim().toUpperCase();
      if (!stock) {
        alert("Please enter a stock symbol.");
        return;
      }
      window.location.href = `${type}.html?stock=${stock}`;
    }
    function gocompare() {
      window.location.href = `compare.html`
    }
  </script>
</body>
</html>
