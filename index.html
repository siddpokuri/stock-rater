<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Rater</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
    }

    pre {
      background: #f0f0f0;
      padding: 20px;
      border-radius: 8px;
      overflow-x: auto;
    }
  </style>
</head>
<body>
  <h1>Stock Rater</h1>
  <input type="text" id="stockInput" placeholder="Enter a stock symbol" />
  <br><br>
  <button onclick="goTo('general')">Get General Info</button>
  <button onclick="goTo('rate')">Get Rating</button>

  <script>
    function goTo(type) {
      const stock = document.getElementById("stockInput").value.trim().toUpperCase();
      if (!stock) {
        alert("Please enter a stock symbol.");
        return;
      }
      // Redirect to the appropriate page with the stock symbol in the URL
      window.location.href = `${type}.html?stock=${stock}`;
    }
  </script>
</body>
</html>
