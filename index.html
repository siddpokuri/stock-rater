<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Rater</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      background-color: #f9f9f9;
    }
    input, button {
      padding: 0.5rem;
      font-size: 1rem;
    }
    #results {
      margin-top: 1.5rem;
      white-space: pre-wrap;
      background: #fff;
      padding: 1rem;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>
  <h1>Stock Rater</h1>
  <p>Enter a stock ticker (like AAPL):</p>
  <input type="text" id="stockInput" placeholder="e.g., AAPL" />
  <button onclick="getStockData()">Get Rating</button>

  <div id="results"></div>

  <script>
    async function getStockData() {
      const stock = document.getElementById("stockInput").value.trim().toUpperCase();
      const resultsDiv = document.getElementById("results");

      if (!stock) {
        resultsDiv.innerText = "Please enter a stock symbol.";
        return;
      }

      resultsDiv.innerText = "Loading...";

      try {
        const response = await fetch(`https://stock-backend-0128.onrender.com/rate?stock=${stock}`);
        const data = await response.json();

        if (data.error) {
          resultsDiv.innerText = "Error: " + data.error;
        } else {
          resultsDiv.innerText = JSON.stringify(data, null, 2);
        }
      } catch (err) {
        resultsDiv.innerText = "Error fetching data: " + err.message;
      }
    }
  </script>
</body>
</html>
