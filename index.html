<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stock Rater</title>
  <style>
    body {
      font-family: helvetica;
      background-color: #5c705c;
      color: #293629;
      margin: 20px;
    }
    h1 {
      color: #293629;
      text-align: center;
    }
    .ratebutton {
      background-color: #0d330f;
      color: 4c634d;
      font-family: helvetica;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
    .genbutton {
      background-color: #0d330f;
      color: 4c634d;
      font-family: helvetica;
      border: none;
      border-radius: 5px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <h1>Stock Rater</h1>
  <input type="text" id="stockInput" placeholder="Enter a stock symbol" />
  <br><br>
  <button class="genbutton" onclick="goTo('general')">Get General Info</button>
  <button class="ratebutton" onclick="goTo('rate')">Get Rating</button>

  <script>
    function goTo(type) {
      const stock = document.getElementById("stockInput").value.trim().toUpperCase();
      if (!stock) {
        alert("Please enter a stock symbol.");
        return;
      }
      // Redirect to the appropriate page with the stock symbol in the URL
      window.location.href = `${type}.html?stock=${stock}`;
    }
  </script>
</body>
</html>
