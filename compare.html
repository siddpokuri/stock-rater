<!DOCTYPE html>
<html>
  <head>
    <title>Compare Two Stocks</title>
    <style>
      body {
        font-family: helvetica;
        align-items: center;
        justify-content: center;
        background-color: #5c705c;
        color: #293629;
        justify-content: center;
        margin: 20px;
        padding: 10px;
      }
      h2 {
        color: #293629;
        text-align: center;
        font-size: 100px;
        padding: 10px;
      }
      #comparebutton {
        background-color: #2e3b2e;
        color: white;
        font-family: helvetica;
        border: none;
        text-align: center;
        border-radius: 5px;
        font-size: 20px;
        padding: 10px;
      }
      #backbutton {
        background-color: #2e3b2e;
        color: white;
        font-family: helvetica;
        border: none;
        text-align: center;
        border-radius: 5px;
        font-size: 10px;
        padding: 10px;
      }
      table {
        width: 100%;
        background-color: white;
        border-collapse: collapse;
        margin-top: 20px;
      }
      #stock1,
      #stock2 {
        background-color: #2e3b2e;
        font-size: 30px;
        color: #4c634d;
        text-align: center;
        padding: 20px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <h2>Compare Two Stocks</h2>
    <input type="text" id="stock1" placeholder="Enter stock symbol">
    <input type="text" id="stock2" placeholder="Enter stock symbol">
    <button id="comparebutton" onclick="compareStocks()">Compare</button>
    <button id="backbutton" onclick="goback()">Go Back</button>
    <div id="result"></div>

    <script>
    function compareStocks() {
      console.log("Comparing stocks...");
      const stock1 = document.getElementById("stock1").value.toUpperCase();
      const stock2 = document.getElementById("stock2").value.toUpperCase();

      Promise.all([
        fetch(`https://stock-backend-0128.onrender.com/rate?stock=${stock1}`).then(res => res.json()),
        fetch(`https://stock-backend-0128.onrender.com/rate?stock=${stock2}`).then(res => res.json())
      ])
      .then(([data1, data2]) => {
        let html = `<table><tr><th>Category</th><th>${stock1}</th><th>${stock2}</th></tr>`;

        const categories = ["valuation", "profitability", "growth", "stability", "overallrating"];
        const labels = {
          valuation: "Valuation",
          profitability: "Profitability",
          growth: "Growth",
          stability: "Stability",
          overallrating: "Overall Rating"
        };

          categories.forEach(cat => {
            html += `<tr>
              <td><strong>${labels[cat]}</strong></td>
              <td>${data1[cat] || 'N/A'}</td>
              <td>${data2[cat] || 'N/A'}</td>
            </tr>`;
          });

          html += `</table>`;
          document.getElementById("result").innerHTML = html;
        })
        .catch(err => {
          document.getElementById("result").innerHTML = "Error fetching stock data.";
        });
      }
      function goback() {
        window.location.href = 'index.html';
      }
    </script>
  </body>
</html>
